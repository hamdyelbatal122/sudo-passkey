version: 2
project_name: passkey-sudo

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: passkey-sudo
    main: ./cmd/passkey-sudo
    binary: passkey-sudo
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
