<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passkey-Sudo Security Gate</title>
  <style>
    :root {
      --bg-1: #0a2029;
      --bg-2: #133b49;
      --card: rgba(248,250,252,0.97);
      --text: #0f172a;
      --muted: #475569;
      --accent: #0ea5a4;
      --danger: #be123c;
      --warn-bg: #fefce8;
      --warn-border: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "IBM Plex Sans","Segoe UI",system-ui,sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #1d4ed8 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, #0ea5a4 0%, transparent 45%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      padding: 1rem;
    }

    /* ── Main panel ───────────────────────────────────────── */
    .panel {
      width: min(640px, 100%);
      background: var(--card);
      border-radius: 20px;
      padding: 1.5rem 1.4rem;
      box-shadow: 0 20px 65px rgba(2,8,23,.35);
      animation: rise .4s ease;
    }
    @keyframes rise {
      from { transform: translateY(14px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    h1 { font-size: clamp(1.2rem,3vw,1.75rem); letter-spacing: .01em; margin-bottom: .5rem; }
    .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }

    /* ── Pulse dot ────────────────────────────────────────── */
    .pulse {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* ── Status box ───────────────────────────────────────── */
    .status {
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 12px;
      padding: .85rem 1rem;
      min-height: 3rem;
      font-family: "IBM Plex Mono",ui-monospace,monospace;
      font-size: .88rem;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .ok  { color: #065f46; }
    .err { color: var(--danger); }

    /* ── Cert warning banner ──────────────────────────────── */
    .cert-warn {
      margin-top: .9rem;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 10px;
      padding: .7rem 1rem;
      font-size: .83rem;
      color: #713f12;
      display: none;
    }
    .cert-warn strong { display: block; margin-bottom: .2rem; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Passkey-Sudo Security Gate</h1>
    <p class="subtitle"><span class="pulse"></span>Complete the passkey prompt from your browser or mobile device.</p>
    <div id="status" class="status">Starting secure flow…</div>
    <div id="cert-warn" class="cert-warn">
      <strong>Phone Passkey</strong>
      You can continue enrollment from your phone by scanning the QR code.
    </div>
  </main>

  <!-- ── QR widget — fixed bottom-left ─────────────────────── -->
  <aside id="qr-widget" style="
    position:fixed; bottom:1.4rem; left:1.4rem;
    background:#fff; border-radius:16px;
    padding:.75rem; box-shadow:0 4px 24px rgba(0,0,0,.18);
    max-width:210px; display:none; animation:rise .5s ease;
  ">
    <p style="font-size:.78rem;font-weight:600;color:#0f172a;margin-bottom:.5rem;text-align:center;">
       Scan to enroll from phone
    </p>
    <img id="qr-img" alt="QR code"
      style="width:180px;height:180px;border-radius:10px;border:1px solid #e2e8f0;display:block;" />
    <p id="qr-url" style="
      margin-top:.45rem; font-family:'IBM Plex Mono',monospace;
      font-size:.68rem; color:#334155; word-break:break-all; text-align:center;
    "></p>
    <p style="font-size:.7rem;color:#64748b;margin-top:.3rem;text-align:center;">
      Opens the same flow page on your LAN
    </p>
  </aside>

  <script>
    const statusBox  = document.getElementById('status');
    const certWarn   = document.getElementById('cert-warn');
    const qrWidget   = document.getElementById('qr-widget');
    const qrImg      = document.getElementById('qr-img');
    const qrUrlTxt   = document.getElementById('qr-url');

    function isMobileClient() {
      const ua = navigator.userAgent || '';
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      const compactScreen = window.matchMedia('(max-width: 900px)').matches;
      return mobileUA || compactScreen;
    }

    function setStatus(text, cls) {
      statusBox.textContent = text;
      statusBox.className = 'status' + (cls ? ' ' + cls : '');
    }

    // ── base64url helpers ─────────────────────────────────────
    function b64ToBuf(b64) {
      const pad  = '='.repeat((4 - b64.length % 4) % 4);
      const base = (b64 + pad).replace(/-/g,'+').replace(/_/g,'/');
      const str  = atob(base);
      const buf  = new Uint8Array(str.length);
      for (let i = 0; i < str.length; i++) buf[i] = str.charCodeAt(i);
      return buf.buffer;
    }
    function bytesToB64(bytes) {
      let s = '';
      bytes.forEach(b => s += String.fromCharCode(b));
      return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    function bufToB64(value) {
      if (value instanceof ArrayBuffer) {
        return bytesToB64(new Uint8Array(value));
      }
      if (ArrayBuffer.isView(value)) {
        return bytesToB64(new Uint8Array(value.buffer, value.byteOffset, value.byteLength));
      }
      return value;
    }
    function normalizeCreate(pk) {
      pk.challenge = b64ToBuf(pk.challenge);
      pk.user.id   = b64ToBuf(pk.user.id);
      (pk.excludeCredentials||[]).forEach(c => c.id = b64ToBuf(c.id));
      return pk;
    }
    function normalizeGet(pk) {
      pk.challenge = b64ToBuf(pk.challenge);
      (pk.allowCredentials||[]).forEach(c => c.id = b64ToBuf(c.id));
      return pk;
    }
    function credToJSON(cred) {
      const resp = {
        clientDataJSON: bufToB64(cred.response.clientDataJSON),
      };

      if ('attestationObject' in cred.response) {
        resp.attestationObject = bufToB64(cred.response.attestationObject);
      }
      if ('authenticatorData' in cred.response) {
        resp.authenticatorData = bufToB64(cred.response.authenticatorData);
      }
      if ('signature' in cred.response) {
        resp.signature = bufToB64(cred.response.signature);
      }
      if ('userHandle' in cred.response && cred.response.userHandle) {
        resp.userHandle = bufToB64(cred.response.userHandle);
      }
      if (typeof cred.response.getTransports === 'function') {
        resp.transports = cred.response.getTransports();
      }
      return { id: cred.id, rawId: bufToB64(cred.rawId), type: cred.type, response: resp,
               clientExtensionResults: cred.getClientExtensionResults() };
    }

    function isCredentialManagerStartError(err) {
      const msg = String((err && err.message) || err || '').toLowerCase();
      return msg.includes('credential manager') || msg.includes('unknown error occurred while starting');
    }

    function buildCreateFallback(publicKey) {
      const pk = { ...publicKey };
      pk.timeout = Math.max(Number(pk.timeout || 0), 120000);
      pk.attestation = 'none';
      delete pk.extensions;

      if (pk.authenticatorSelection) {
        pk.authenticatorSelection = { ...pk.authenticatorSelection };
        // Android Credential Manager is more stable when attachment is not forced.
        delete pk.authenticatorSelection.authenticatorAttachment;
        if (pk.authenticatorSelection.residentKey === 'required') {
          pk.authenticatorSelection.residentKey = 'preferred';
        }
        if (pk.authenticatorSelection.requireResidentKey === true) {
          pk.authenticatorSelection.requireResidentKey = false;
        }
      }
      return pk;
    }

    function buildGetFallback(publicKey) {
      const pk = { ...publicKey };
      pk.timeout = Math.max(Number(pk.timeout || 0), 120000);
      delete pk.extensions;
      // Some Android devices fail to start when allowCredentials is too strict.
      if (Array.isArray(pk.allowCredentials) && pk.allowCredentials.length > 0) {
        pk.allowCredentials = undefined;
      }
      return pk;
    }

    async function createWithRetry(publicKey) {
      try {
        return await navigator.credentials.create({ publicKey });
      } catch (err) {
        if (!isCredentialManagerStartError(err)) {
          throw err;
        }
        setStatus('Retrying with mobile-compatible settings…');
        return navigator.credentials.create({ publicKey: buildCreateFallback(publicKey) });
      }
    }

    async function getWithRetry(publicKey) {
      try {
        return await navigator.credentials.get({ publicKey });
      } catch (err) {
        if (!isCredentialManagerStartError(err)) {
          throw err;
        }
        setStatus('Retrying authentication with mobile-compatible settings…');
        return navigator.credentials.get({ publicKey: buildGetFallback(publicKey) });
      }
    }

    // ── Load QR when mobile mode is active ───────────────────
    async function loadQR() {
      try {
        const meta = await (await fetch('/api/meta')).json();
        if (meta.mobile_hint) {
          certWarn.innerHTML = '<strong>Phone Passkey</strong>' + meta.mobile_hint;
        }
        if (meta.mobile_ready && meta.mobile_url && !isMobileClient()) {
          qrImg.src   = '/qr.png';
          qrUrlTxt.textContent = meta.mobile_url;
          qrWidget.style.display = 'block';
          certWarn.style.display = 'block';
        } else {
          qrWidget.style.display = 'none';
          certWarn.style.display = 'block';
        }
      } catch (_) { /* ignore — QR is optional */ }
    }

    // ── Main ceremony ─────────────────────────────────────────
    async function start() {
      await loadQR();
      try {
        const beginResp = await fetch('/api/begin', { method: 'POST' });
        const beginData = await beginResp.json();
        if (!beginResp.ok) throw new Error(beginData.error || 'Failed to initialise challenge');

        if (beginData.publicKey.user) {
          // ── Registration ──────────────────────────────────
          normalizeCreate(beginData.publicKey);
          setStatus('Touch your fingerprint sensor or use phone passkey (registration)…');
          const cred = await createWithRetry(beginData.publicKey);
          const fin  = await fetch('/api/finish', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body:    JSON.stringify(credToJSON(cred)),
          });
          const finData = await fin.json();
          if (!fin.ok) throw new Error(finData.error || 'Enrollment failed');
          setStatus('✓ Passkey enrolled successfully. You can close this tab.', 'ok');
          qrWidget.style.display = 'none';
          return;
        }

        // ── Authentication ────────────────────────────────────
        normalizeGet(beginData.publicKey);
        setStatus('Touch your fingerprint sensor to authorise the command…');
        const assertion = await getWithRetry(beginData.publicKey);
        const fin = await fetch('/api/finish', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body:    JSON.stringify(credToJSON(assertion)),
        });
        const finData = await fin.json();
        if (!fin.ok) throw new Error(finData.error || 'Verification failed');
        setStatus('✓ Authentication succeeded. Command is now allowed.', 'ok');
        qrWidget.style.display = 'none';

      } catch (err) {
        setStatus('Error: ' + (err.message || err), 'err');
      }
    }

    if (!window.PublicKeyCredential) {
      setStatus('WebAuthn is unavailable on this origin.\nUse localhost on this device or enable trusted HTTPS public origin for mobile.', 'err');
      loadQR(); // still show QR so user can switch to phone
    } else {
      start();
    }
  </script>
</body>
</html>
