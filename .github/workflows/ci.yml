name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Tidy
        run: go mod tidy

      - name: Format check
        run: |
          mapfile -t gofiles < <(git ls-files '*.go')
          if [[ ${#gofiles[@]} -eq 0 ]]; then
            echo "No tracked Go files found"
            exit 1
          fi
          unformatted="$(gofmt -l "${gofiles[@]}")"
          if [[ -n "$unformatted" ]]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
