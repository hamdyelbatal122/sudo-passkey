name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Tidy
        run: go mod tidy

      - name: Source structure check
        run: |
          test -f go.mod || (echo "missing go.mod" && exit 1)
          mapfile -t gofiles < <(git ls-files '*.go')
          if [[ ${#gofiles[@]} -lt 1 ]]; then
            echo "No Go files found"
            exit 1
          fi
          test -d internal || (echo "missing internal directory" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
