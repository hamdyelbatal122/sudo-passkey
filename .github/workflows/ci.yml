name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Tidy
        run: go mod tidy

      - name: Format check
        run: |
          dirs=()
          [[ -d ./cmd ]] && dirs+=(./cmd)
          [[ -d ./internal ]] && dirs+=(./internal)
          if [[ ${#dirs[@]} -eq 0 ]]; then
            echo "No Go source directories found"
            exit 1
          fi
          test -z "$(gofmt -l "${dirs[@]}")"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
